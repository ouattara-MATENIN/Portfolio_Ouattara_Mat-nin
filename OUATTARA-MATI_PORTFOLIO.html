    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            background-color: #f0f0f0; /* Fond clair */
        }

        header {
            background-color: #1a1a1a; /* Gris très foncé pour le header */
            padding: 20px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            color: #e5e5e5; /* Gris clair pour le logo */
            font-size: 1.8em;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            color: #b0b0b0; /* Gris clair pour les liens */
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover, .active {
            color: #ff9800; /* Orange vif pour le survol */
        }

        .presentation {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 50px; /* Padding ajusté pour mieux espacer le contenu */
            background: url('WhatsApp Image 2025-04-03 à 11.16.14_0d73702a.jpg') no-repeat center center/cover;
            color: white;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Overlay plus clair */
        }

        .content {
            position: relative;
            z-index: 1;
        }

        .content h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .content p {
            font-size: 1.5em;
            margin: 10px 0;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #ff9800; /* Orange vif pour le bouton */
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #fb8c00; /* Orange plus foncé au survol */
        }

        .footer {
            background-color: #1a1a1a; /* Gris très foncé pour le footer */
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        .footer a {
            margin: 0 15px;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer a img {
            width: 40px;
            height: 40px;
        }

        .footer a:hover {
            opacity: 0.7;
        }
    </style>
