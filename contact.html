<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #333;
            padding: 15px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav ul li a:hover, .active {
            color: #f39c12;
        }

        /* Conteneur principal */
        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
        }

        /* Section iframe */
        .iframe-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        iframe {
            width: 90%;
            height: 80%;
            border: 2px solid #333;
        }

        /* Section formulaire */
        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }

        form {
            width: 80%;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            background-color: #fafafa;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background-color: #e78421;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #f5b255;
        }

        /* Footer */
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 0;
        }

        .footer a {
            margin: 0 10px;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .footer a i {
            font-size: 40px;
            color: white;
        }

        .footer a:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Mati</div>
        <nav>

                <li><a href="projets.html">Projets</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header><br><br>

    <main>
        <div class="iframe-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3972.1565631450185!2d-3.891984925960248!3d5.393098635268248!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfc18d5d2be68349%3A0x52bb48cf83f2337d!2sBingerville%20Akandj%C3%A9!5e0!3m2!1sfr!2sci!4v1743695234958!5m2!1sfr!2sci" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="form-container">
            <form>
                <h2>Formulaire</h2>
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email :</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message :</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">Envoyer</button>
            </form>
        </div>
    </main><br> <br>

    <footer class="footer">

            <i class="fab fa-linkedin"></i>
        </a>
    </footer>

</body>
</html>
