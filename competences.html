<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Compétences</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Import Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f8f8f8;
    text-align: center;
}

/* HEADER */
header {
    background-color: #1a1a1a;
    padding: 20px 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.logo {
    color: #e5e5e5;
    font-size: 1.8em;
    font-weight: bold;
}

nav ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
}

nav ul li {
    margin: 0 20px;
}

nav ul li a {
    color: #b0b0b0;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

nav ul li a:hover, .active {
    color: #ff9800;
}

/* CONTENU PRINCIPAL */
.skills-container {
    width: 80%;
    max-width: 800px;
    background: white;
    padding: 20px;
    margin: 50px auto;
    border-radius: 10px;
    box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
}

h1 {
    font-size: 24px;
    margin-bottom: 20px;
}

.skills-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.skill {
    text-align: left;
}

.progress-bar {
    background: #ddd;
    border-radius: 5px;
    height: 10px;
    width: 100%;
    position: relative;
    overflow: hidden;
}

.progress {
    height: 100%;
    background: #e17b0e;
    color: white;
    text-align: center;
    line-height: 10px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 5px;
    transition: width 0.5s ease-in-out;
}

/* FOOTER */
footer {
    background-color: #1a1a1a;
    color: white;
    padding: 20px;
    text-align: center;
}

footer a {
    color: white;
    margin: 0 10px;
    font-size: 40px;
    transition: color 0.3s;
}

footer a:hover {
    color: #535352;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .skills-grid {
        grid-template-columns: 1fr;
    }

    header {
        flex-direction: column;
        text-align: center;
    }

    nav ul {
        flex-direction: column;
        padding: 10px;
    }

    nav ul li {
        margin: 10px 0;
    }
}

    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">Mati</div>
        <nav>
            <ul>
                <li><a href="OUATTARA-MATI_PORTFOLIO.html">Présentation</a></li>
                <li><a href="etudes.html">Études</a></li>
                <li><a href="competences.html" class="active">Compétences</a></li>
                <li><a href="projets.html">Projets</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- CONTENU PRINCIPAL -->
    <main>
        <div class="skills-container">
            <h1>Mes Compétences</h1>

            <div class="skills-grid">
                <div class="skill">
                    <h3>HTML</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 80%;">80%</div>
                    </div>
                </div>

                <div class="skill">
                    <h3>CSS</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 70%;">70%</div>
                    </div>
                </div>

                <div class="skill">
                    <h3>JavaScript</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 25%;">25%</div>
                    </div>
                </div>

                <div class="skill">
                    <h3>PHP</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 20%;">20%</div>
                    </div>
                </div>

                <div class="skill">
                    <h3>Photoshop</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 50%;">50%</div>
                    </div>
                </div>

                <div class="skill">
                    <h3>MySQL</h3>
                    <div class="progress-bar">
                        <div class="progress" style="width: 45%;">45%</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>Retrouvez-moi sur :</p>
        <a href="https://web.facebook.com/massangue.ouattara.75?locale=fr_FR" target="_blank">

        </a>
        <a href="https://www.linkedin.com/in/maman-mat%C3%A9nin-ouattara-b2a15a306/" target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>
    </footer>

</body>
</html>
